server:
  port: 8083

spring:
  application:
    name: pdd-order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:pdd_flash_sale}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pdd}
    password: ${RABBITMQ_PASSWORD:pdd123456}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms
        default-requeue-rejected: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

pdd:
  worker-id: 3
  jwt:
    secret: ${JWT_SECRET:pdd-flash-sale-platform-secret-key-must-be-32-bytes}
