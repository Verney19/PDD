<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDD 618 登录</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-visual">
        <div class="brand">
            <div class="brand-mark">618</div>
            <div>
                <h1>PDD 秒杀平台</h1>
                <p>618 限量手机专场</p>
            </div>
        </div>
        <div class="login-copy">
            <p class="eyebrow">100000 台手机 · 618 限时发放</p>
            <h2>登录后参与秒杀和幸运抽奖</h2>
            <p>普通用户 demo / 123456，管理员 admin / 123456。活动期间每个账号都有专属参与机会。</p>
        </div>
    </section>

    <section class="login-card">
        <div class="section-title">
            <div>
                <h3>账号登录</h3>
                <p>登录后即可查看活动进度、参与秒杀和抽奖。</p>
            </div>
        </div>

        <div class="login-form">
            <label for="baseUrl">服务地址</label>
            <input id="baseUrl" value="http://localhost:8080" autocomplete="off">

            <label for="username">用户名</label>
            <input id="username" value="demo" autocomplete="username">

            <label for="password">密码</label>
            <input id="password" type="password" value="123456" autocomplete="current-password">

            <div class="actions">
                <button id="loginBtn">登录</button>
                <button id="registerBtn" class="secondary-button">注册新账号</button>
            </div>
        </div>

        <div class="quick-login">
            <button class="secondary-button" data-account="demo">填入 demo</button>
            <button class="secondary-button" data-account="admin">填入 admin</button>
            <a class="inline-link" href="./index.html">返回控制台</a>
        </div>

        <div id="toast" class="toast hidden"></div>
    </section>
</main>

<script src="./src/core/constants.js"></script>
<script src="./src/core/utils.js"></script>
<script src="./src/core/state.js"></script>
<script src="./src/core/http.js"></script>
<script src="./src/api/authApi.js"></script>
<script src="./login.js"></script>
</body>
</html>
